transform_name: "AddGPSEInformation"
transform_type: "data manipulation"
max_rank: 2
copy_initial: ${model.preprocessing_params.copy_initial}
neighborhoods: ${model.preprocessing_params.neighborhoods}


# Pretrained GPSE model parameters (must match checkpoint architecture)
pretrain_model: PCQM4MV2
dim_target_node: 51 # Node-level embedding dimension output by GPSE model
dim_target_graph: 11 # Graph-level embedding dimension output by GPSE model  
dim_out: 11 # Model creation parameter (unused but must match checkpoint)

# Concat of dim_target_node and dim_target_graph
dim_pses: [62]

max_hop: ${get_hop_num_gpse:${.copy_initial}}
in_channels: ${infer_in_hasse_graph_agg_dim:${.neighborhoods}, ${.dim_pses}, ${.max_rank}, ${.max_hop}, ${oc.select:dataset.parameters.num_features}, ${.dim_target_graph}, ${.dim_target_node}, ${.copy_initial}, ${oc.select:dataset.parameters.preserve_edge_attr_if_lifted}}
device: ${trainer.accelerator}
cuda: ${trainer.devices}
